# Netlify configuration for AURUM (Next.js static export)
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Static export already produces clean routes; this is a safety net for SPA-style
# deep links that don't map to a generated .html file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the immutable Next.js build assets.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
